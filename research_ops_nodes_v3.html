<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Ops — Node Graph</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;overflow:hidden;height:100vh}
#wrap{display:flex;height:100vh;width:100vw;position:relative}
#nw{flex:1;background:#0b0b14;overflow:hidden;position:relative;cursor:grab;user-select:none;transition:background .4s}
#nw.pan{cursor:grabbing}
#nw.before-bg{background:#110b0b}
#cv{position:absolute;width:1600px;height:1600px;transform-origin:0 0}
.grid-bg{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.045) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
#svg-l{position:absolute;inset:0;width:1600px;height:1600px;pointer-events:none;overflow:visible}
.nd{position:absolute;background:#1a1a26;border:0.5px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;transition:border-color .15s,transform .15s,opacity .3s;display:flex;align-items:center;gap:10px;padding:9px 14px 9px 9px}
.nd:hover{border-color:rgba(255,255,255,.24);transform:translateY(-1px)}
.nd.hi{border-color:var(--nc)!important;transform:translateY(-2px)}
.nd.cat-dim{opacity:.05!important;transform:none!important;pointer-events:none;transition:opacity .25s}
.nd-logo{width:32px;height:32px;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.nd-info{flex:1;min-width:0}
.nd-title{font-size:12px;font-weight:500;color:#d4d0c8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.nd-sub{font-size:9.5px;color:rgba(255,255,255,.3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nd-sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.port-in,.port-out{position:absolute;width:10px;height:10px;border-radius:50%;top:50%;transform:translateY(-50%);z-index:3;background:#252535;border:1.5px solid #12121e;transition:background .15s,box-shadow .15s}
.port-in{left:-5px}
.port-out{right:-5px}
.nd:hover .port-in,.nd:hover .port-out{background:var(--nc)}
.nd.hi .port-in,.nd.hi .port-out{background:var(--nc);box-shadow:0 0 7px var(--nc)}
.col-lbl{position:absolute;font-size:8px;font-weight:500;letter-spacing:.1em;color:rgba(255,255,255,.15);text-transform:uppercase}
.team-sep{position:absolute;left:0;width:1600px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18) 8%,rgba(255,255,255,.18) 92%,transparent);pointer-events:none}
.team-lbl{position:absolute;left:14px;font-size:8px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;opacity:.55;pointer-events:none;background:#0b0b14;padding:0 8px 0 0}
/* presentation mode */
.cv-smooth{transition:transform .55s cubic-bezier(.4,0,.2,1)!important}
.nd.pres-dim{opacity:.18!important;filter:saturate(.4);transition:opacity .35s,filter .35s}
.nd.pres-active{opacity:1!important;border-color:var(--nc)!important;box-shadow:0 0 0 2px var(--nc),0 12px 40px rgba(0,0,0,.55);transform:translateY(-2px) scale(1.02);transition:all .35s}
.nd.pres-active .port-in,.nd.pres-active .port-out{background:var(--nc);box-shadow:0 0 8px var(--nc)}
#present-bar{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(80px);display:flex;gap:10px;align-items:center;z-index:100;background:rgba(8,8,16,.94);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:7px 8px 7px 18px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.4,0,.2,1);opacity:0;pointer-events:none;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
body.present-mode #present-bar{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.pres-counter{font-family:monospace;font-size:11px;color:rgba(255,255,255,.7);letter-spacing:.05em;min-width:44px;text-align:center}
.pres-divider{width:1px;height:18px;background:rgba(255,255,255,.12);margin:0 4px}
.pres-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;line-height:1;padding:0}
.pres-btn:hover{background:rgba(255,255,255,.18);color:#fff}
.pres-btn.exit{background:rgba(226,75,74,.15);border-color:rgba(226,75,74,.3);color:#f87171;font-size:10px;width:auto;padding:0 12px;border-radius:15px}
.pres-btn.exit:hover{background:rgba(226,75,74,.28)}
.pres-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.06em;text-transform:uppercase}
.cb.present-toggle{background:rgba(155,123,255,.12);border-color:rgba(155,123,255,.3);color:#bda6ff;font-size:11px;width:auto;padding:0 10px;gap:5px;display:inline-flex;align-items:center}
.cb.present-toggle:hover{background:rgba(155,123,255,.22);color:#d4c5ff}
body.present-mode #topbar,body.present-mode .leg,body.present-mode .state-banner{opacity:.18;pointer-events:none;transition:opacity .3s}
body.present-mode #topbar:hover{opacity:1;pointer-events:auto}
body.present-mode #nw{cursor:default!important}
body.present-mode #nw.pan{cursor:default!important}
.pres-mode-tag{display:none;padding:0 10px 0 4px;font-family:monospace;font-size:10px;color:rgba(155,123,255,.85);letter-spacing:.1em;text-transform:uppercase}
body.present-mode.pres-single .pres-mode-tag{display:inline-block}
body.present-mode.pres-single .pres-label,
body.present-mode.pres-single .pres-counter,
body.present-mode.pres-single .pres-divider,
body.present-mode.pres-single .pres-nav-prev,
body.present-mode.pres-single .pres-nav-next{display:none}
.p-focus-btn{width:26px;height:26px;border-radius:6px;background:rgba(155,123,255,.13);border:1px solid rgba(155,123,255,.32);color:#bda6ff;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-right:6px;padding:0;transition:background .15s}
.p-focus-btn:hover{background:rgba(155,123,255,.25);color:#d4c5ff}

/* ───── Panel content classes (used by openPanel JS) ───── */
.pp-head{padding:18px 18px 14px;border-bottom:0.5px solid rgba(255,255,255,.07)}
.pp-row{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.pp-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pp-meta{flex:1;min-width:0}
.pp-title{font-size:15px;font-weight:500;color:#e8e4dc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp-cat{font-size:10px;color:rgba(255,255,255,.28);margin-top:2px}
.pp-close{width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;transition:background .15s}
.pp-close:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.pp-status{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pp-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.pp-status-txt{font-size:10px;font-weight:500}
.pp-status-divider{font-size:10px;color:rgba(255,255,255,.18);margin:0 4px}
.pp-mode-badge{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid;display:inline-block}
.pp-section{padding:14px 18px;border-bottom:0.5px solid rgba(255,255,255,.07)}
.pp-section-label{font-size:9px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:7px}
.pp-section-body{font-size:12px;color:rgba(255,255,255,.5);line-height:1.7}
.pp-section-row{padding:12px 18px;border-bottom:0.5px solid rgba(255,255,255,.07);display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.pp-impact-label{font-size:10px;color:rgba(255,255,255,.28);flex-shrink:0}
.pp-impact-value{font-size:11px;color:rgba(255,255,255,.5);text-align:right}
.pp-open-btn{display:flex;align-items:center;justify-content:space-between;margin:14px 18px 0;padding:11px 14px;border-radius:9px;color:#e2ddd4;font-size:12px;font-weight:500;text-decoration:none;transition:background .15s}

/* ═══════════════════ LIGHT MODE ═══════════════════ */
/* Editor-style light theme: white bg, mint cross-grid */
body.light{background:#ffffff}
body.light #nw{background:#ffffff}
body.light #nw.before-bg{background:#fdf4f4}
body.light .grid-bg{
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='28' height='28'><path d='M14 11v6M11 14h6' stroke='%23dbeee4' stroke-width='0.9' stroke-linecap='round' fill='none'/></svg>");
  background-size:28px 28px;
}
body.light #topbar{
  background:rgba(255,255,255,.96);
  border-bottom-color:rgba(0,0,0,.07);
}
body.light .tb-title{color:#0a0a0a;font-weight:500}
body.light .tb-sub{color:#7a7a7a}
body.light .switcher{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08)}
body.light .sw-btn{color:rgba(0,0,0,.42)}
body.light .sw-before{background:#fde9e9;color:#b73a2a;border:1px solid rgba(196,64,43,.28)}
body.light .sw-after{background:#e6f5ec;color:#2c6b3a;border:1px solid rgba(34,140,80,.32)}
body.light .cb{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08);color:rgba(0,0,0,.55)}
body.light .cb:hover{background:rgba(0,0,0,.09);color:#000}
body.light .cb.present-toggle{background:rgba(155,123,255,.12);border-color:rgba(155,123,255,.32);color:#7253d9}
body.light .cb.present-toggle:hover{background:rgba(155,123,255,.2);color:#5b3eb8}
body.light .zm{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.06);color:rgba(0,0,0,.45)}
body.light .leg{background:rgba(255,255,255,.94);border-color:rgba(0,0,0,.08)}
body.light .li{color:rgba(0,0,0,.5)}
body.light .li:hover{color:#0a0a0a;background:rgba(0,0,0,.05)}
body.light .li.locked{color:#0a0a0a;background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.14)}
body.light .li.locked .ld{box-shadow:0 0 0 2px rgba(0,0,0,.1)}
body.light .state-banner.banner-before{background:#fde9e9;border-color:rgba(196,64,43,.28);color:#b73a2a}
body.light .state-banner.banner-after{background:#e6f5ec;border-color:rgba(34,140,80,.32);color:#2c6b3a}
body.light .col-lbl{color:rgba(0,0,0,.32)}
body.light .team-sep{background:linear-gradient(90deg,transparent,rgba(0,0,0,.13) 8%,rgba(0,0,0,.13) 92%,transparent)}
body.light .team-lbl{background:#ffffff}
/* Nodes go light on light bg (matches the editor reference) */
body.light .nd{background:#ffffff;border-color:rgba(0,0,0,.1);box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.06)}
body.light .nd-title{color:#0a0a0a}
body.light .nd-sub{color:rgba(0,0,0,.45)}
body.light .port-in,body.light .port-out{background:#ffffff;border-color:rgba(0,0,0,.18)}
body.light .nd:hover{box-shadow:0 0 0 2px rgba(124,92,255,.32),0 8px 24px rgba(0,0,0,.12);border-color:rgba(124,92,255,.45)}
body.light .nd.hi{box-shadow:0 0 0 2px var(--nc),0 12px 32px rgba(0,0,0,.18)}
body.light .nd.pres-active{box-shadow:0 0 0 2px var(--nc),0 16px 44px rgba(0,0,0,.22)}
body.light .nd.pres-dim{filter:saturate(.5) brightness(.95)}
/* Side panel goes light too */
body.light #panel{background:#ffffff;border-left-color:rgba(0,0,0,.08)}
body.light #panel::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15)}
body.light .pp-head{border-bottom-color:rgba(0,0,0,.08)}
body.light .pp-title{color:#0a0a0a}
body.light .pp-cat{color:rgba(0,0,0,.45)}
body.light .pp-close{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.5)}
body.light .pp-close:hover{background:rgba(0,0,0,.1);color:#000}
body.light .pp-status-divider{color:rgba(0,0,0,.2)}
body.light .pp-section{border-bottom-color:rgba(0,0,0,.08)}
body.light .pp-section-label{color:rgba(0,0,0,.42)}
body.light .pp-section-body{color:rgba(0,0,0,.65)}
body.light .pp-section-row{border-bottom-color:rgba(0,0,0,.08)}
body.light .pp-impact-label{color:rgba(0,0,0,.42)}
body.light .pp-impact-value{color:rgba(0,0,0,.6)}
body.light .pp-open-btn{color:#0a0a0a}
body.light .p-focus-btn{color:#7253d9;background:rgba(124,92,255,.1);border-color:rgba(124,92,255,.32)}
body.light .p-focus-btn:hover{background:rgba(124,92,255,.18);color:#5b3eb8}
/* Present bar in light mode */
body.light #present-bar{background:rgba(255,255,255,.96);border-color:rgba(0,0,0,.1);color:#0a0a0a;box-shadow:0 8px 32px rgba(0,0,0,.12)}
body.light .pres-counter{color:rgba(0,0,0,.6)}
body.light .pres-divider{background:rgba(0,0,0,.1)}
body.light .pres-btn{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.65)}
body.light .pres-btn:hover{background:rgba(0,0,0,.1);color:#000}
body.light .pres-label,body.light .pres-mode-tag{color:rgba(0,0,0,.45)}
/* Brand mark in topbar */
.brand-block{display:flex;align-items:center;gap:12px}
.brand-mark-svg{width:28px;height:28px;flex-shrink:0;display:block}
.brand-text-wrap{display:flex;flex-direction:column}
#panel{width:290px;min-width:290px;background:#0f0f1a;border-left:1px solid rgba(255,255,255,.08);overflow-y:auto;transition:width .25s,min-width .25s;position:relative}
#panel.closed{width:0;min-width:0;border:none;overflow:hidden}
#panel::-webkit-scrollbar{width:4px}
#panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.p-head{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.p-icon-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.p-icon-bg{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.p-title{font-size:15px;font-weight:500;color:#e8e4dc}
.p-cat{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
.p-desc{font-size:12px;color:rgba(255,255,255,.45);line-height:1.65;margin-top:2px}
.p-section{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.p-sec-label{font-size:9px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:8px}
.p-row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;font-size:12px}
.p-row-l{color:rgba(255,255,255,.35)}
.p-row-v{color:#e2ddd4;font-weight:500}
.green{color:#4ade80!important}.red{color:#f87171!important}.amber{color:#fbbf24!important}
.p-open-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin:14px 18px 0;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#e2ddd4;font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;transition:background .15s}
.p-open-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.28)}
.p-close-btn{display:block;margin:12px 18px 0;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.3);font-size:11px;cursor:pointer;text-align:center}
.p-close-btn:hover{background:rgba(255,255,255,.06)}
.p-state-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;margin-top:8px}
#topbar{position:absolute;top:0;left:0;right:0;height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(11,11,20,.9);border-bottom:1px solid rgba(255,255,255,.07);z-index:10}
.tb-title{font-size:13px;font-weight:500;color:rgba(255,255,255,.7)}
.tb-sub{font-size:10px;color:rgba(255,255,255,.25)}
.switcher{display:flex;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:3px;gap:2px}
.sw-btn{padding:5px 16px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.4);transition:all .2s}
.sw-before{background:#2a0f0f;color:#f87171;border:1px solid rgba(226,75,74,.25)}
.sw-after{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.tb-controls{display:flex;align-items:center;gap:6px}
.cb{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.cb:hover{background:rgba(255,255,255,.15);color:#fff}
.zm{height:28px;padding:0 8px;border-radius:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);font-size:10px;font-family:monospace;display:flex;align-items:center}
.leg{position:absolute;bottom:10px;left:10px;display:flex;gap:12px;align-items:center;background:rgba(8,8,16,.9);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:7px 12px;z-index:5}
.li{display:flex;align-items:center;gap:5px;font-size:9.5px;color:rgba(255,255,255,.32);cursor:pointer;border-radius:6px;padding:4px 7px;margin:-4px -3px;transition:background .15s,color .15s,border-color .15s;border:1px solid transparent}
.li:hover{color:rgba(255,255,255,.65);background:rgba(255,255,255,.06)}
.li.locked{color:#fff;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18)}
.li.locked .ld{box-shadow:0 0 0 2px rgba(255,255,255,.18)}
.ld{width:7px;height:7px;border-radius:50%;transition:box-shadow .15s}
.nd.cat-dim{opacity:.05!important;transform:none!important;pointer-events:none;transition:opacity .25s}
.state-banner{position:absolute;top:56px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:500;padding:4px 14px;border-radius:20px;z-index:6;pointer-events:none;white-space:nowrap}
.banner-before{background:rgba(226,75,74,.12);border:1px solid rgba(226,75,74,.25);color:#f87171}
.banner-after{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#4ade80}
</style>
</head>
<body>
<div id="wrap">
  <div id="nw">
    <div id="cv"><div class="grid-bg"></div><svg id="svg-l" style="position:absolute;inset:0;width:1600px;height:1600px;pointer-events:none;overflow:visible"></svg></div>
    <div id="topbar">
      <div class="brand-block">
        <svg class="brand-mark-svg" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#ec4078"/>
          <path d="M7.5 22 L7.5 10 L11 10 L13.5 14.5 L16 19 L18.5 14.5 L21 10 L24.5 10 L24.5 22 L22 22 L22 14.5 L18.5 19.5 L13.5 19.5 L10 14.5 L10 22 Z" fill="white"/>
        </svg>
        <div class="brand-text-wrap">
          <div class="tb-title">Research ops pipeline</div>
          <div class="tb-sub">Mermaid · click any node to open · drag to pan · scroll to zoom</div>
        </div>
      </div>
      <div class="switcher">
        <button class="sw-btn sw-before" id="sw-b" onclick="setMode('before')">Before</button>
        <button class="sw-btn" id="sw-a" onclick="setMode('after')">After</button>
      </div>
      <div class="tb-controls">
        <button class="cb present-toggle" id="btn-present" onclick="enterPresent()" title="Presentation mode (P)">▶ Present</button>
        <button class="cb" id="btn-theme" onclick="toggleTheme()" title="Toggle light / dark mode"><svg viewBox="0 0 16 16" fill="none" style="width:14px;height:14px"><circle cx="8" cy="8" r="3.2" fill="currentColor"/><g stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="8" y1="1" x2="8" y2="2.6"/><line x1="8" y1="13.4" x2="8" y2="15"/><line x1="1" y1="8" x2="2.6" y2="8"/><line x1="13.4" y1="8" x2="15" y2="8"/><line x1="3.05" y1="3.05" x2="4.2" y2="4.2"/><line x1="11.8" y1="11.8" x2="12.95" y2="12.95"/><line x1="3.05" y1="12.95" x2="4.2" y2="11.8"/><line x1="11.8" y1="4.2" x2="12.95" y2="3.05"/></g></svg></button>
        <button class="cb" onclick="fitView()" title="Fit to screen">⊡</button>

  calendly:{url:'https://calendly.com',m:'Booking auto-creates Google Meet link and reminders',role:'Converts an Apollo outreach response into a confirmed interview slot. The booking link is embedded in the email sequence — when a user clicks and books, Calendly auto-creates the Meet link, sends reminders, and triggers the post-interview gift card automation.'},
  claude:{url:'https://claude.ai',m:'Tags themes, extracts quotes, flags severity, creates Vistaly cards',role:'The synthesis engine for all research inputs. Same prompt, same taxonomy, same output format whether processing a PM interview transcript, a Maze test result, or a Statsig experiment. Creates the unified research pool in Vistaly that makes cross-team findings visible for the first time.'},
  confluence:{url:'https://mermaidchart.atlassian.net',m:'Experiment docs — being unified into Vistaly',role:'Currently the only home for Growth experiment results. In the new pipeline, Confluence is kept for structured experiment charters but results are cross-referenced into Vistaly so they appear alongside interview and survey data.'},
  cursor:{url:'https://cursor.sh',m:'Real code prototype → richer test signal than click-through',role:'Used in Phase 2 of the design workflow as an alternative to Figma prototyping. Cursor + Claude produces a working coded prototype deployed to a Vercel preview URL. Maze tests on real code give more reliable usability signal than click-throughs — testers encounter actual error states and real interaction patterns.'},
  netlify:{url:'https://netlify.com',m:'30-second deploy for Claude artifact prototypes',role:'Used when the prototype was built as a Claude HTML artifact. Claude artifact URLs are session-private and can\'t be shared with Maze testers. Deploying to Netlify (one command: netlify drop) creates a public URL that feeds into the same Zapier trigger as Vercel previews.'},
  vercel:{url:'https://vercel.com',m:'Auto-generates preview URL on every Cursor push',role:'Vercel is the deployment target for Cursor + Claude prototypes. Every git push auto-generates a preview URL — no manual deploy step. That URL is pasted into the Jira Prototype URL field to trigger the Maze test. Vercel can also post the preview URL to Slack automatically, removing even the paste step.'},

function drawEdges(){
  svgl.innerHTML='';
  const reach=lockedCat?getReachableIds(lockedCat):null;
  const isLight=document.body.classList.contains('light');
  cE.forEach(e=>{
    const s=pO(e.f),d=pI(e.t); if(!s||!d) return;
    const dx=Math.abs(d.x-s.x)*0.52;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${s.x},${s.y} C${s.x+dx},${s.y} ${d.x-dx},${d.y} ${d.x},${d.y}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',e.c||'#888');
    path.setAttribute('stroke-width',isLight?'1.8':'1.5');
    if(e.d) path.setAttribute('stroke-dasharray','5 4');
    const nodeActive=hiId&&(e.f===hiId||e.t===hiId);
    const inFlow=reach&&reach.has(e.f)&&reach.has(e.t);
    let op;
    if(lockedCat){op=inFlow?(isLight?'0.85':'0.75'):(isLight?'0.06':'0.03');}
    else if(hiId){op=nodeActive?(isLight?'0.95':'0.9'):(isLight?'0.12':'0.07');}
    else{op=isLight?'0.6':'0.42';}
    path.setAttribute('opacity',op);
    svgl.appendChild(path);
  });
}

function getReachableIds(cat){
  const seeds=Object.values(nMap).filter(n=>n.c===cat).map(n=>n.id);
  const visited=new Set(seeds);
  const queue=[...seeds];
  while(queue.length){
    const id=queue.shift();
    cE.forEach(e=>{
      if(e.f===id&&!visited.has(e.t)){visited.add(e.t);queue.push(e.t);}
    });
  }
  return visited;
}

function applyLock(){
  const reach=lockedCat?getReachableIds(lockedCat):null;
  document.querySelectorAll('.nd').forEach(el=>{
    const id=el.id.replace('n-','');
    const n=nMap[id]; if(!n) return;
    el.classList.toggle('cat-dim',!!(lockedCat&&!reach.has(id)));
  });
  document.querySelectorAll('.li').forEach(li=>{
    li.classList.toggle('locked',li.id.replace('leg-','')===lockedCat);
  });
}

function lockCat(cat){
  lockedCat=(lockedCat===cat)?null:cat;

let scale=0.7,ox=20,oy=48,drag=false,sx=0,sy=0,sox=0,soy=0;
let minScale=0.25, maxScale=2, contentBBox={x1:0,y1:0,x2:1600,y2:1600};
const PADDING=60, TOPBAR_H=46;

function getViewport(){
  const panel=document.getElementById('panel');
  const panelW=panel.classList.contains('closed')?0:panel.offsetWidth;
  return {w:nw.clientWidth-panelW, h:nw.clientHeight-TOPBAR_H};
}

function computeContentBBox(){
  let x1=Infinity,y1=Infinity,x2=-Infinity,y2=-Infinity;
  if(!cN||!cN.length) return {x1:0,y1:0,x2:1600,y2:1600};
  cN.forEach(n=>{
    const w=n.w||W;
    x1=Math.min(x1,n.x);
    y1=Math.min(y1,n.y);
    x2=Math.max(x2,n.x+w);
    y2=Math.max(y2,n.y+56);
  });
  return {x1:x1-PADDING,y1:y1-PADDING,x2:x2+PADDING,y2:y2+PADDING};
}

function recomputeBounds(){
  contentBBox=computeContentBBox();
  const v=getViewport();
  const cw=contentBBox.x2-contentBBox.x1, ch=contentBBox.y2-contentBBox.y1;
  minScale=Math.min(v.w/cw, v.h/ch);
  if(scale<minScale) scale=minScale;
}

function clampPan(){
  const v=getViewport();
  const cw=(contentBBox.x2-contentBBox.x1)*scale;
  const ch=(contentBBox.y2-contentBBox.y1)*scale;
  const margin=80;
  if(cw<=v.w){
    ox=(v.w-cw)/2-contentBBox.x1*scale;
  } else {
    const minOx=v.w-margin-contentBBox.x2*scale;
    const maxOx=margin-contentBBox.x1*scale;
    ox=Math.max(minOx,Math.min(maxOx,ox));
  }
  if(ch<=v.h){
    oy=TOPBAR_H+(v.h-ch)/2-contentBBox.y1*scale;
  } else {
    const minOy=TOPBAR_H+v.h-margin-contentBBox.y2*scale;
    const maxOy=TOPBAR_H+margin-contentBBox.y1*scale;
    oy=Math.max(minOy,Math.min(maxOy,oy));
  }
}

function applyT(){
  if(scale<minScale) scale=minScale;
  if(scale>maxScale) scale=maxScale;
  if(!presentMode) clampPan();
  cv.style.transform=`translate(${ox}px,${oy}px) scale(${scale})`;
  document.getElementById('zm-lbl').textContent=Math.round(scale*100)+'%';
}

nw.addEventListener('mousedown',e=>{
  if(presentMode) return;
  if(e.target.closest('.nd')||e.target.closest('#topbar')||e.target.closest('.leg')||e.target.closest('#present-bar'))return;
  drag=true;sx=e.clientX;sy=e.clientY;sox=ox;soy=oy;nw.classList.add('pan');
});
window.addEventListener('mousemove',e=>{if(!drag)return;ox=sox+(e.clientX-sx);oy=soy+(e.clientY-sy);applyT();});
window.addEventListener('mouseup',()=>{drag=false;nw.classList.remove('pan');});

nw.addEventListener('wheel',e=>{
  e.preventDefault();
  if(presentMode) return;
  // multiplicative zoom — gentler, scale-aware
  const factor=Math.exp(-e.deltaY*0.0008);
  const ns=Math.max(minScale,Math.min(maxScale,scale*factor));
  if(ns===scale) return;
  const r=nw.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  ox=mx-(mx-ox)*(ns/scale);
  oy=my-(my-oy)*(ns/scale);
  scale=ns;
  applyT();
},{passive:false});

document.getElementById('btn-zi').onclick=()=>{
  const ns=Math.min(maxScale,scale*1.18);
  const v=getViewport(),mx=v.w/2,my=TOPBAR_H+v.h/2;
  ox=mx-(mx-ox)*(ns/scale);oy=my-(my-oy)*(ns/scale);
  scale=ns;applyT();
};
document.getElementById('btn-zo').onclick=()=>{
  const ns=Math.max(minScale,scale/1.18);
  const v=getViewport(),mx=v.w/2,my=TOPBAR_H+v.h/2;
  ox=mx-(mx-ox)*(ns/scale);oy=my-(my-oy)*(ns/scale);
  scale=ns;applyT();
};

function fitView(){
  recomputeBounds();
  const v=getViewport();
  const cw=contentBBox.x2-contentBBox.x1, ch=contentBBox.y2-contentBBox.y1;
  scale=Math.min(v.w/cw, v.h/ch);
  ox=(v.w-cw*scale)/2-contentBBox.x1*scale;
  oy=TOPBAR_H+(v.h-ch*scale)/2-contentBBox.y1*scale;
  cv.classList.add('cv-smooth');
  applyT();
  setTimeout(()=>cv.classList.remove('cv-smooth'),600);
}

window.addEventListener('resize',()=>{recomputeBounds();applyT();});

/* ────────── PRESENTATION MODE ────────── */
let presentMode=false, presentIdx=0, presentOrder=[];

function buildPresentOrder(){
  // If a category filter is locked, only present the visible (reachable) nodes
  if(lockedCat){
    const reach=getReachableIds(lockedCat);
    presentOrder=cN.filter(n=>reach.has(n.id)).map(n=>n.id);
  } else {
    presentOrder=cN.map(n=>n.id);
  }
}

function enterPresent(opts){
  opts=opts||{};
  if(!cN||!cN.length) return;
  presentMode=true;
  if(opts.singleId&&nMap[opts.singleId]){
    presentOrder=[opts.singleId];
    document.body.classList.add('pres-single');
  } else {
    buildPresentOrder();
    document.body.classList.remove('pres-single');
  }
  presentIdx=0;
  document.body.classList.add('present-mode');
  // open panel space so layout settles before focus
  document.getElementById('panel').classList.remove('closed');
  setTimeout(()=>focusPresentNode(),50);
}

function focusOnNode(id){
  enterPresent({singleId:id});
}

function exitPresent(){
  presentMode=false;
  document.body.classList.remove('present-mode');
  document.body.classList.remove('pres-single');
  document.querySelectorAll('.nd').forEach(el=>{
    el.classList.remove('pres-active','pres-dim');
  });
  closePanel();
  setTimeout(()=>fitView(),60);
}

function presentNext(){
  if(!presentMode) return;
  if(presentIdx<presentOrder.length-1){
    presentIdx++;
    focusPresentNode();
  }
}
function presentPrev(){
  if(!presentMode) return;
  if(presentIdx>0){
    presentIdx--;
    focusPresentNode();
  }
}

function focusPresentNode(){
  const id=presentOrder[presentIdx];
  const n=nMap[id];
  if(!n||!n.el) return;
  // dim/highlight
  document.querySelectorAll('.nd').forEach(el=>{
    el.classList.remove('pres-active');
    el.classList.add('pres-dim');
  });
  n.el.classList.remove('pres-dim');
  n.el.classList.add('pres-active');
  // zoom to node
  const targetScale=1.5;
  const v=getViewport();
  const nodeW=n.w||W;
  const nodeH=n.el.offsetHeight||50;
  const cx=n.x+nodeW/2, cy=n.y+nodeH/2;
  scale=targetScale;
  ox=v.w/2-cx*scale;
  oy=TOPBAR_H+v.h/2-cy*scale;
  cv.classList.add('cv-smooth');
  cv.style.transform=`translate(${ox}px,${oy}px) scale(${scale})`;
  document.getElementById('zm-lbl').textContent=Math.round(scale*100)+'%';
  setTimeout(()=>cv.classList.remove('cv-smooth'),600);
  // open side panel
  openPanel(n);
  // update counter
  const counter=document.getElementById('pres-counter');
  if(counter) counter.textContent=`${presentIdx+1} / ${presentOrder.length}`;
}

document.addEventListener('keydown',e=>{
  // Allow P key to enter presentation mode anytime
  if(!presentMode && (e.key==='p'||e.key==='P')){
    if(document.activeElement&&['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
    enterPresent();
    return;
  }
  if(!presentMode) return;
  if(e.key==='ArrowRight'||e.key===' '||e.key==='Enter'){
    e.preventDefault();presentNext();
  } else if(e.key==='ArrowLeft'){
    e.preventDefault();presentPrev();
  } else if(e.key==='Escape'){
    e.preventDefault();exitPresent();
  }
});

// Click-to-advance in present mode (anywhere except buttons / panel / nodes)
nw.addEventListener('click',e=>{
  if(!presentMode) return;
  if(e.target.closest('.nd')||e.target.closest('#panel')||e.target.closest('#present-bar')||e.target.closest('#topbar')) return;
  if(document.body.classList.contains('pres-single')){
    exitPresent();
  } else {
    presentNext();
  }
});

// Restore theme BEFORE first render to avoid flash of dark
try{
  const saved=localStorage.getItem('mc-nodes-theme');
  if(saved==='light') document.body.classList.add('light');
}catch(e){}

setMode('before');
fitView();

/* ────────── THEME TOGGLE ────────── */
function toggleTheme(){
  const isLight=document.body.classList.toggle('light');
  try{localStorage.setItem('mc-nodes-theme',isLight?'light':'dark');}catch(e){}
  updateThemeIcon();
  drawEdges();
}
function updateThemeIcon(){
  const btn=document.getElementById('btn-theme');
  if(!btn) return;
  const isLight=document.body.classList.contains('light');
  // Sun icon when in dark (clicking goes to light), moon icon when in light (clicking goes to dark)
  btn.innerHTML=isLight
    ? '<svg viewBox="0 0 16 16" fill="none" style="width:14px;height:14px"><path d="M13.5 9.2A5.6 5.6 0 0 1 6.8 2.5a.4.4 0 0 0-.5-.5 6.5 6.5 0 1 0 7.7 7.7.4.4 0 0 0-.5-.5z" fill="currentColor"/></svg>'
    : '<svg viewBox="0 0 16 16" fill="none" style="width:14px;height:14px"><circle cx="8" cy="8" r="3.2" fill="currentColor"/><g stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><line x1="8" y1="1" x2="8" y2="2.6"/><line x1="8" y1="13.4" x2="8" y2="15"/><line x1="1" y1="8" x2="2.6" y2="8"/><line x1="13.4" y1="8" x2="15" y2="8"/><line x1="3.05" y1="3.05" x2="4.2" y2="4.2"/><line x1="11.8" y1="11.8" x2="12.95" y2="12.95"/><line x1="3.05" y1="12.95" x2="4.2" y2="11.8"/><line x1="11.8" y1="4.2" x2="12.95" y2="3.05"/></g></svg>';
}
updateThemeIcon();
